<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Productivity Factory</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AI Productivity Factory</p>
          <h1>Pipeline Dashboard</h1>
          <p class="subtle">Live view of product pipeline and revenue.</p>
        </div>
        <nav class="nav">
          <a class="nav-link active" href="./index.html">Pipeline</a>
          <a class="nav-link" href="./products.html">Products</a>
          <a class="nav-link" href="./tasks.html">Tasks</a>
        </nav>
      </header>

      <main class="stack">
        <section class="panel">
          <div class="panel-head">
            <h2>Pipeline Stages</h2>
            <p id="pipeline-updated" class="subtle">Loading...</p>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Stage</th>
                  <th>Count</th>
                  <th>Products</th>
                </tr>
              </thead>
              <tbody id="pipeline-body">
                <tr><td colspan="3" class="empty">Loading pipeline...</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Summary</h2>
          </div>
          <div id="pipeline-summary" class="subtle">Loading...</div>
        </section>
      </main>
    </div>

    <script>window.__BASE__ = "/ai-money-arena";</script>
    <script src="./app.js"></script>
    <script>
      AIProductivityFactory.startPipelinePage();
    </script>
  </body>
</html>
