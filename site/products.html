<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Productivity Factory – Products</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AI Productivity Factory</p>
          <h1>All Products</h1>
          <p class="subtle">Every generated product and its current status.</p>
        </div>
        <nav class="nav">
          <a class="nav-link" href="./index.html">Pipeline</a>
          <a class="nav-link active" href="./products.html">Products</a>
          <a class="nav-link" href="./tasks.html">Tasks</a>
        </nav>
      </header>

      <main class="stack">
        <section class="panel">
          <div class="panel-head">
            <h2>Products</h2>
            <p id="products-updated" class="subtle">Loading...</p>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Status</th>
                  <th style="text-align:right">Price</th>
                  <th style="text-align:right">Revenue</th>
                </tr>
              </thead>
              <tbody id="products-body">
                <tr><td colspan="4" class="empty">Loading products...</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
    <script>
      AIProductivityFactory.startProductsPage();
    </script>
  </body>
</html>
