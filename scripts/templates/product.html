<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{{TITLE}}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

    @page {
      size: A4;
      margin: 0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: {{FONT_PRIMARY}};
      color: {{TEXT}};
      background: {{BG}};
      font-size: 10.5pt;
      line-height: 1.65;
    }

    /* ─── COVER PAGE ─── */
    .cover-page {
      width: 210mm;
      height: 297mm;
      background: {{BG}};
      display: flex;
      flex-direction: column;
      padding: 22mm 22mm 18mm;
      position: relative;
      overflow: hidden;
    }

    .cover-accent-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 8mm;
      height: 100%;
      background: {{SECONDARY}};
    }

    .cover-top-rule {
      height: 2px;
      background: {{SECONDARY}};
      margin-bottom: 16mm;
      opacity: 0.25;
    }

    .cover-category {
      font-size: 8pt;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: {{SECONDARY}};
      margin-bottom: 10mm;
    }

    .cover-title {
      font-family: {{FONT_SECONDARY}};
      font-size: 34pt;
      font-weight: 700;
      color: {{PRIMARY}};
      line-height: 1.1;
      margin: 0 0 8mm;
      max-width: 155mm;
    }

    .cover-divider {
      width: 18mm;
      height: 3px;
      background: {{SECONDARY}};
      border-radius: 2px;
      margin-bottom: 8mm;
    }

    .cover-subtitle {
      font-size: 12pt;
      color: {{TEXT}};
      opacity: 0.7;
      line-height: 1.55;
      max-width: 135mm;
      margin-bottom: 14mm;
      font-weight: 300;
    }

    .cover-instructions {
      flex: 1;
      background: {{ACCENT}};
      border-radius: 4px;
      padding: 8mm 10mm;
      margin-bottom: 10mm;
    }

    .cover-instructions h3 {
      font-size: 8pt;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: {{SECONDARY}};
      margin: 0 0 5mm;
    }

    .cover-instructions ul {
      margin: 0;
      padding-left: 4mm;
      list-style: none;
    }

    .cover-instructions li {
      font-size: 10pt;
      color: {{TEXT}};
      line-height: 1.6;
      margin-bottom: 2.5mm;
      padding-left: 4mm;
      position: relative;
    }

    .cover-instructions li::before {
      content: '→';
      position: absolute;
      left: -2mm;
      color: {{SECONDARY}};
      font-weight: 600;
    }

    .cover-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 5mm;
      border-top: 1px solid {{SECONDARY}};
      opacity: 0.4;
    }

    .cover-footer-brand {
      font-size: 8pt;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .cover-footer-format {
      font-size: 8pt;
      letter-spacing: 0.5px;
    }

    /* ─── CONTENT PAGES ─── */
    .content-page {
      width: 210mm;
      min-height: 297mm;
      padding: 20mm 22mm;
      page-break-before: always;
      background: {{BG}};
    }

    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10mm;
      padding-bottom: 3mm;
      border-bottom: 1.5px solid {{SECONDARY}};
    }

    .content-header-title {
      font-size: 8pt;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: {{SECONDARY}};
    }

    .content-header-page {
      font-size: 8pt;
      color: {{TEXT}};
      opacity: 0.4;
    }

    /* ─── TYPOGRAPHY ─── */
    h1 {
      font-family: {{FONT_SECONDARY}};
      color: {{PRIMARY}};
      font-size: 22pt;
      margin: 0 0 6mm;
      line-height: 1.15;
      font-weight: 700;
      page-break-after: avoid;
    }

    h2 {
      font-family: {{FONT_PRIMARY}};
      color: {{PRIMARY}};
      font-size: 11pt;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin: 10mm 0 4mm;
      padding-bottom: 2mm;
      border-bottom: 1.5px solid {{SECONDARY}};
      page-break-after: avoid;
    }

    h3 {
      font-family: {{FONT_PRIMARY}};
      color: {{PRIMARY}};
      font-size: 10.5pt;
      font-weight: 600;
      margin: 7mm 0 2mm;
      page-break-after: avoid;
    }

    p {
      margin: 0 0 4mm;
    }

    ul, ol {
      margin: 0 0 4mm;
      padding-left: 5mm;
    }

    li {
      margin-bottom: 1.5mm;
      line-height: 1.6;
    }

    /* ─── TABLES ─── */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 5mm 0 8mm;
      font-size: 9pt;
      page-break-inside: avoid;
    }

    th {
      background: {{PRIMARY}};
      color: {{BG}};
      font-weight: 600;
      font-size: 8pt;
      letter-spacing: 0.5px;
      padding: 2.5mm 3.5mm;
      text-align: left;
      border: none;
    }

    td {
      padding: 2.5mm 3.5mm;
      border-bottom: 1px solid {{ACCENT}};
      border-right: none;
      border-left: none;
      vertical-align: top;
    }

    tr:nth-child(even) td {
      background: {{ACCENT}};
    }

    tr:nth-child(odd) td {
      background: {{BG}};
    }

    /* ─── CHECKBOXES ─── */
    .task-list-item {
      list-style: none;
      margin-left: -4mm;
      display: flex;
      align-items: flex-start;
      gap: 2.5mm;
      margin-bottom: 2mm;
    }

    .task-list-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 4mm;
      height: 4mm;
      min-width: 4mm;
      border: 1.5px solid {{SECONDARY}};
      border-radius: 1px;
      margin-top: 0.8mm;
      display: inline-block;
    }

    /* ─── SECTIONS ─── */
    .section {
      page-break-inside: avoid;
      margin-bottom: 8mm;
    }

    .page-break {
      page-break-before: always;
    }

    /* ─── MISC ─── */
    blockquote {
      border-left: 3px solid {{SECONDARY}};
      margin: 5mm 0;
      padding: 3mm 5mm;
      background: {{ACCENT}};
      border-radius: 0 3px 3px 0;
      font-style: italic;
      opacity: 0.85;
    }

    hr {
      border: none;
      border-top: 1px solid {{ACCENT}};
      margin: 6mm 0;
    }

    /* ─── FOOTER ─── */
    .page-footer {
      margin-top: 12mm;
      padding-top: 3mm;
      border-top: 1px solid {{ACCENT}};
      display: flex;
      justify-content: space-between;
      font-size: 7.5pt;
      color: {{TEXT}};
      opacity: 0.35;
    }
  </style>
</head>
<body>

  <!-- ═══ PAGE 1: COVER ═══ -->
  <div class="cover-page">
    <div class="cover-accent-bar"></div>
    <div class="cover-top-rule"></div>
    <div class="cover-category">Productivity · Instant Download</div>
    <h1 class="cover-title">{{TITLE}}</h1>
    <div class="cover-divider"></div>
    <p class="cover-subtitle">{{SUBTITLE}}</p>

    <div class="cover-instructions">
      <h3>How to Use</h3>
      {{HOW_TO_USE}}
    </div>

    <div class="cover-footer">
      <span class="cover-footer-brand">{{BRAND_NAME}}</span>
      <span class="cover-footer-format">Print-Ready PDF · {{THEME_NAME}}</span>
    </div>
  </div>

  <!-- ═══ PAGE 2+: CONTENT ═══ -->
  <div class="content-page">
    <div class="content-header">
      <span class="content-header-title">{{TITLE}}</span>
      <span class="content-header-page">{{BRAND_NAME}}</span>
    </div>

    {{CONTENT}}

    <div class="page-footer">
      <span>{{BRAND_NAME}} &mdash; {{TITLE}}</span>
      <span>Print &amp; Use · lazywh.com</span>
    </div>
  </div>

</body>
</html>
