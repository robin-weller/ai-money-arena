<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@400;700&display=swap');

    @page {
      size: A4;
      margin: 20mm;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: {{FONT_PRIMARY}};
      background: {{BG}};
      color: {{TEXT}};
      font-size: 11pt;
      line-height: 1.6;
      margin: 0;
      padding: 0;
    }

    .page {
      max-width: 170mm;
      margin: 0 auto;
      padding: 10mm 0 20mm;
    }

    h1 {
      font-family: {{FONT_SECONDARY}};
      color: {{PRIMARY}};
      font-size: 22pt;
      margin: 0 0 6mm;
      line-height: 1.2;
    }

    h2 {
      font-family: {{FONT_SECONDARY}};
      color: {{PRIMARY}};
      font-size: 14pt;
      margin: 8mm 0 3mm;
      padding-left: 4mm;
      border-left: 3px solid {{SECONDARY}};
      line-height: 1.3;
    }

    h3 {
      font-family: {{FONT_PRIMARY}};
      color: {{PRIMARY}};
      font-size: 11pt;
      font-weight: 600;
      margin: 6mm 0 2mm;
    }

    p {
      margin: 0 0 3mm;
    }

    ul, ol {
      margin: 0 0 3mm;
      padding-left: 6mm;
    }

    li {
      margin-bottom: 1mm;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 4mm 0;
      font-size: 9.5pt;
    }

    th {
      background: {{ACCENT}};
      color: {{TEXT}};
      font-weight: 600;
      padding: 2mm 3mm;
      text-align: left;
      border: 1px solid {{SECONDARY}};
    }

    td {
      padding: 2mm 3mm;
      border: 1px solid {{SECONDARY}};
      vertical-align: top;
    }

    tr:nth-child(even) td {
      background: {{ACCENT}};
    }

    blockquote {
      border-left: 3px solid {{SECONDARY}};
      margin: 4mm 0;
      padding: 2mm 4mm;
      color: {{TEXT}};
      opacity: 0.85;
    }

    code {
      font-family: monospace;
      font-size: 9pt;
      background: {{ACCENT}};
      padding: 0.5mm 1.5mm;
      border-radius: 2px;
    }

    pre {
      background: {{ACCENT}};
      border: 1px solid {{SECONDARY}};
      border-radius: 3px;
      padding: 3mm 4mm;
      overflow: auto;
      font-size: 9pt;
    }

    pre code {
      background: none;
      padding: 0;
    }

    hr {
      border: none;
      border-top: 1px solid {{SECONDARY}};
      margin: 5mm 0;
    }

    .task-list-item {
      list-style: none;
      margin-left: -4mm;
    }

    .task-list-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 3.5mm;
      height: 3.5mm;
      border: 1.5px solid {{SECONDARY}};
      border-radius: 1px;
      margin-right: 2mm;
      vertical-align: middle;
      position: relative;
      top: -0.3mm;
      display: inline-block;
    }

    .task-list-item input[type="checkbox"]:checked {
      background: {{SECONDARY}};
    }

    .footer {
      margin-top: 12mm;
      padding-top: 3mm;
      border-top: 1px solid {{SECONDARY}};
      font-size: 8pt;
      color: {{TEXT}};
      opacity: 0.5;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>{{TITLE}}</h1>
    {{CONTENT}}
    <div class="footer">A {{BRAND_NAME}} productivity tool &middot; {{THEME_NAME}}</div>
  </div>
</body>
</html>
