<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1280px; height: 720px; overflow: hidden;
      background: {{BG}};
      font-family: {{FONT_PRIMARY}};
      color: {{TEXT}};
    }

    .wrapper {
      position: relative;
      width: 1280px; height: 720px;
      display: flex;
      overflow: hidden;
    }

    /* Left accent strip */
    .accent-strip {
      width: 12px;
      height: 100%;
      background: {{SECONDARY}};
      flex-shrink: 0;
    }

    /* Left content panel */
    .left-panel {
      flex: 1;
      padding: 70px 64px 60px 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      max-width: 780px;
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .category-pill {
      display: inline-block;
      background: {{SECONDARY}};
      color: {{BG}};
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 999px;
    }

    .middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 0;
    }

    h1 {
      font-family: {{FONT_SECONDARY}};
      font-size: 58px;
      font-weight: 700;
      color: {{PRIMARY}};
      line-height: 1.1;
      margin-bottom: 24px;
      max-width: 680px;
    }

    .divider {
      width: 56px; height: 4px;
      background: {{SECONDARY}};
      border-radius: 2px;
      margin-bottom: 24px;
    }

    .subtitle {
      font-size: 19px;
      color: {{TEXT}};
      opacity: 0.68;
      line-height: 1.55;
      max-width: 560px;
      font-weight: 300;
    }

    .bottom-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .format-badge {
      display: inline-block;
      border: 1.5px solid {{SECONDARY}};
      color: {{SECONDARY}};
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 7px 20px;
      border-radius: 999px;
    }

    .brand-name {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: {{TEXT}};
      opacity: 0.35;
    }

    /* Right decorative panel */
    .right-panel {
      width: 380px;
      flex-shrink: 0;
      background: {{ACCENT}};
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .right-circle-1 {
      position: absolute;
      width: 320px; height: 320px;
      border-radius: 50%;
      border: 2px solid {{SECONDARY}};
      opacity: 0.15;
      top: -60px; right: -80px;
    }

    .right-circle-2 {
      position: absolute;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: {{SECONDARY}};
      opacity: 0.12;
      bottom: -40px; left: -40px;
    }

    .right-icon {
      position: relative;
      width: 160px; height: 200px;
      background: {{BG}};
      border-radius: 8px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      padding: 20px 16px 16px;
      gap: 8px;
    }

    .right-icon-title {
      width: 80%; height: 10px;
      background: {{PRIMARY}};
      border-radius: 3px;
      opacity: 0.8;
    }

    .right-icon-line {
      height: 7px;
      background: {{ACCENT}};
      border-radius: 2px;
    }

    .right-icon-table {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 3px;
      flex: 1;
      margin-top: 4px;
    }

    .right-icon-cell {
      background: {{ACCENT}};
      border-radius: 1px;
    }

    .right-icon-cell.header {
      background: {{SECONDARY}};
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="accent-strip"></div>

    <div class="left-panel">
      <div class="top-row">
        <span class="category-pill">{{PRODUCT_TYPE_LABEL}}</span>
      </div>

      <div class="middle">
        <h1>{{TITLE}}</h1>
        <div class="divider"></div>
        <p class="subtitle">{{SUMMARY}}</p>
      </div>

      <div class="bottom-row">
        <span class="format-badge">Instant Download &middot; PDF</span>
        <span class="brand-name">{{BRAND_NAME}}</span>
      </div>
    </div>

    <div class="right-panel">
      <div class="right-circle-1"></div>
      <div class="right-circle-2"></div>
      <div class="right-icon">
        <div class="right-icon-title"></div>
        <div class="right-icon-line" style="width:70%"></div>
        <div class="right-icon-line" style="width:55%"></div>
        <div class="right-icon-table">
          <div class="right-icon-cell header"></div>
          <div class="right-icon-cell header"></div>
          <div class="right-icon-cell header"></div>
          <div class="right-icon-cell"></div>
          <div class="right-icon-cell"></div>
          <div class="right-icon-cell"></div>
          <div class="right-icon-cell"></div>
          <div class="right-icon-cell"></div>
          <div class="right-icon-cell"></div>
          <div class="right-icon-cell"></div>
          <div class="right-icon-cell"></div>
          <div class="right-icon-cell"></div>
          <div class="right-icon-cell"></div>
          <div class="right-icon-cell"></div>
          <div class="right-icon-cell"></div>
          <div class="right-icon-cell"></div>
          <div class="right-icon-cell"></div>
          <div class="right-icon-cell"></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var h1 = document.querySelector('h1');
      if (h1 && h1.textContent.length > 50) {
        h1.style.fontSize = '44px';
      }
      if (h1 && h1.textContent.length > 70) {
        h1.style.fontSize = '36px';
      }
    })();
  </script>
</body>
</html>
