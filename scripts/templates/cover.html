<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@400;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
    }

    body {
      background: {{BG}};
      font-family: {{FONT_PRIMARY}};
      color: {{TEXT}};
      position: relative;
    }

    /* Decorative corner accents */
    .corner-tl {
      position: absolute;
      top: 0;
      left: 0;
      width: 200px;
      height: 200px;
      background: {{ACCENT}};
      clip-path: polygon(0 0, 100% 0, 0 100%);
      opacity: 0.6;
    }

    .corner-br {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 280px;
      height: 280px;
      background: {{SECONDARY}};
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
      opacity: 0.15;
    }

    .corner-tr {
      position: absolute;
      top: 0;
      right: 0;
      width: 120px;
      height: 120px;
      background: {{SECONDARY}};
      clip-path: polygon(100% 0, 100% 100%, 0 0);
      opacity: 0.2;
    }

    /* Left vertical stripe */
    .stripe {
      position: absolute;
      top: 0;
      left: 0;
      width: 8px;
      height: 100%;
      background: {{SECONDARY}};
    }

    /* Main content area */
    .content {
      position: absolute;
      top: 0;
      left: 8px;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 72px 96px 72px 80px;
    }

    .category {
      font-family: {{FONT_PRIMARY}};
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: {{SECONDARY}};
      margin-bottom: 24px;
    }

    h1 {
      font-family: {{FONT_SECONDARY}};
      font-size: 52px;
      font-weight: 700;
      color: {{PRIMARY}};
      line-height: 1.15;
      margin-bottom: 28px;
      max-width: 820px;
    }

    .divider {
      width: 64px;
      height: 4px;
      background: {{SECONDARY}};
      margin-bottom: 28px;
      border-radius: 2px;
    }

    .subtitle {
      font-size: 20px;
      color: {{TEXT}};
      opacity: 0.75;
      max-width: 680px;
      line-height: 1.5;
      margin-bottom: 40px;
    }

    .badge {
      display: inline-block;
      background: {{SECONDARY}};
      color: {{BG}};
      font-family: {{FONT_PRIMARY}};
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 8px 20px;
      border-radius: 999px;
      text-transform: uppercase;
    }

    .brand-name {
      position: absolute;
      bottom: 32px;
      right: 48px;
      font-family: {{FONT_PRIMARY}};
      font-size: 13px;
      font-weight: 600;
      color: {{TEXT}};
      opacity: 0.4;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>
  <div class="corner-tr"></div>
  <div class="stripe"></div>

  <div class="content">
    <div class="category">{{NICHE}}</div>
    <h1>{{TITLE}}</h1>
    <div class="divider"></div>
    <p class="subtitle">{{SUMMARY}}</p>
    <span class="badge">instant download &middot; print &amp; use</span>
  </div>

  <div class="brand-name">{{BRAND_NAME}}</div>
</body>
</html>
