<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1280px; height: 720px; overflow: hidden;
      background: {{ACCENT}};
      font-family: {{FONT_PRIMARY}};
      color: {{TEXT}};
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 64px;
      padding: 48px 72px;
    }

    /* ─── PAPER MOCKUP ─── */
    .mockup-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .paper-shadow {
      position: absolute;
      top: 14px; left: 12px;
      width: 340px; height: 460px;
      background: {{SECONDARY}};
      border-radius: 6px;
      opacity: 0.18;
      filter: blur(2px);
    }

    .paper {
      position: relative;
      width: 340px; height: 460px;
      background: #ffffff;
      border-radius: 4px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.14);
      padding: 24px 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    /* Top accent bar on paper */
    .paper-bar {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 4px;
      background: {{SECONDARY}};
    }

    .paper-title {
      font-family: Playfair Display, serif;
      font-size: 13px;
      font-weight: 700;
      color: {{PRIMARY}};
      line-height: 1.3;
      margin-top: 6px;
    }

    .paper-rule {
      height: 1.5px;
      background: {{SECONDARY}};
      opacity: 0.35;
    }

    /* Simulated text lines */
    .text-lines { display: flex; flex-direction: column; gap: 5px; }
    .text-line {
      height: 7px;
      background: {{ACCENT}};
      border-radius: 2px;
    }

    /* Simulated table */
    .mock-table {
      width: 100%;
      border-collapse: collapse;
    }
    .mock-table th {
      background: {{PRIMARY}};
      height: 14px;
      opacity: 0.85;
    }
    .mock-table td {
      height: 12px;
      border-bottom: 1px solid {{ACCENT}};
    }
    .mock-table tr:nth-child(even) td {
      background: #f6f6f6;
    }

    /* Simulated checkboxes */
    .checkbox-list { display: flex; flex-direction: column; gap: 6px; }
    .checkbox-row { display: flex; align-items: center; gap: 7px; }
    .checkbox-box {
      width: 11px; height: 11px;
      border: 1.5px solid {{SECONDARY}};
      border-radius: 2px; flex-shrink: 0;
    }
    .checkbox-line { height: 7px; background: {{ACCENT}}; border-radius: 2px; flex: 1; }

    /* ─── INFO PANEL ─── */
    .info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      max-width: 580px;
    }

    .tag-pill {
      display: inline-block;
      background: {{SECONDARY}};
      color: {{BG}};
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 999px;
      width: fit-content;
    }

    .info-title {
      font-family: Playfair Display, serif;
      font-size: 38px;
      font-weight: 700;
      color: {{PRIMARY}};
      line-height: 1.18;
    }

    .info-divider {
      width: 40px; height: 3px;
      background: {{SECONDARY}};
      border-radius: 2px;
    }

    .info-tagline {
      font-size: 15px;
      color: {{TEXT}};
      opacity: 0.7;
      line-height: 1.55;
      font-weight: 300;
    }

    .feature-list { display: flex; flex-direction: column; gap: 9px; }
    .feature-item { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; line-height: 1.45; }
    .feature-dot {
      width: 7px; height: 7px;
      background: {{SECONDARY}};
      border-radius: 50%;
      flex-shrink: 0; margin-top: 4px;
    }

    .info-brand {
      font-size: 10px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: {{TEXT}}; opacity: 0.35;
    }
  </style>
</head>
<body>
  <div class="mockup-wrap">
    <div class="paper-shadow"></div>
    <div class="paper">
      <div class="paper-bar"></div>
      <div class="paper-title">{{TITLE}}</div>
      <div class="paper-rule"></div>
      <div class="text-lines">
        <div class="text-line" style="width:88%"></div>
        <div class="text-line" style="width:72%"></div>
      </div>
      <table class="mock-table">
        <thead><tr><th></th><th></th><th></th><th></th></tr></thead>
        <tbody>
          <tr><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td><td></td></tr>
        </tbody>
      </table>
      <div class="checkbox-list">
        <div class="checkbox-row"><div class="checkbox-box"></div><div class="checkbox-line" style="width:78%"></div></div>
        <div class="checkbox-row"><div class="checkbox-box"></div><div class="checkbox-line" style="width:62%"></div></div>
        <div class="checkbox-row"><div class="checkbox-box"></div><div class="checkbox-line" style="width:71%"></div></div>
      </div>
    </div>
  </div>

  <div class="info">
    <span class="tag-pill">Printable Template</span>
    <div class="info-title">{{TITLE}}</div>
    <div class="info-divider"></div>
    <p class="info-tagline">{{SUMMARY}}</p>
    <div class="feature-list">{{BULLETS}}</div>
    <div class="info-brand">{{BRAND_NAME}}</div>
  </div>
</body>
</html>
